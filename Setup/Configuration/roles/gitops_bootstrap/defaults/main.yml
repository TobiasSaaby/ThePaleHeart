---
bootstrap_env_file: "{{ playbook_dir }}/../.env"

gitops_services_path_local: "{{ playbook_dir }}/../../../Services/Platform"
gitops_helm_repositories:
  - name: argo
    repo_url: https://argoproj.github.io/argo-helm
  - name: jetstack
    repo_url: https://charts.jetstack.io
  - name: longhorn
    repo_url: https://charts.longhorn.io
  - name: simply-dns-webhook
    repo_url: https://runnerm.github.io/simply-dns-webhook/

argocd_namespace: argocd
argocd_chart_version: 9.5.17
argocd_application_manifest: "{{ gitops_services_path_local }}/ArgoCD/argocd.application.yaml"
argocd_ownership_wait_retries: 60
argocd_ownership_wait_delay: 10

cert_manager_namespace: cert-manager
cert_manager_chart_version: v1.20.2
cert_manager_issuers_path: "{{ playbook_dir }}/../../../Services/Platform/CertManager/Issuers"
cert_manager_application_manifest: "{{ gitops_services_path_local }}/CertManager/cert-manager.application.yaml"
cert_manager_issuers_application_manifest: "{{ gitops_services_path_local }}/CertManager/cert-manager-issuers.application.yaml"

simply_dns_webhook_chart_version: 1.9.0
simply_credentials_secret_name: simply-credentials
simply_account_name: ""
simply_api_key: ""
simply_dns_webhook_application_manifest: "{{ gitops_services_path_local }}/SimplyDNSWebhook/simply-dns-webhook.application.yaml"

longhorn_namespace: longhorn-system
longhorn_chart_version: 1.12.0
longhorn_domain: longhorn.saaby.no
longhorn_default_replica_count: 3
longhorn_application_manifest: "{{ gitops_services_path_local }}/Longhorn/longhorn.application.yaml"
