- name: Update apt cache
  apt:
    update_cache: true

- name: Upgrade packages
  apt:
    upgrade: dist

- name: Install host baseline tools
  apt:
    name:
      - ca-certificates
      - curl
      - iptables
      - nfs-common
      - open-iscsi
      - vim
    state: present

- name: Disable swap immediately
  command: swapoff -a
  when: ansible_facts['swaptotal_mb'] | default(0) > 0

- name: Remove swap from fstab
  replace:
    path: /etc/fstab
    regexp: ".*swap.*"
    replace: ""

- name: Load required kernel modules
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Persist kernel modules
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter

- name: Set sysctl params for Kubernetes networking
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: true
  loop:
    - { name: net.bridge.bridge-nf-call-iptables, value: 1 }
    - { name: net.bridge.bridge-nf-call-ip6tables, value: 1 }
    - { name: net.ipv4.ip_forward, value: 1 }

- name: Ensure iSCSI daemon is enabled and running
  systemd:
    name: iscsid
    enabled: true
    state: started
