- name: Fetch and install kubeconfig locally
  hosts: k3s_servers
  gather_facts: false

  vars:
    bootstrap_env_file: "{{ playbook_dir }}/../.env"
    bootstrap_env_lines: "{{ lookup('file', bootstrap_env_file, errors='ignore').splitlines() }}"
    simply_domain: "{{ ((bootstrap_env_lines | select('match', '^SIMPLY_DOMAIN=') | list | first | default('SIMPLY_DOMAIN=local')).split('=', 1))[1] }}"
    api_domain: "k3s.{{ simply_domain }}"

  tasks:
    - name: Ensure local kube directory exists
      file:
        path: "{{ lookup('env','HOME') }}/.kube"
        state: directory
      delegate_to: localhost
      run_once: true

    - name: Get LB IP from var
      set_fact:
        k3s_lb_ip: "{{ api_domain }}"
      run_once: true

    - name: Fetch kubeconfig from init node
      slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: kubeconfig_raw
      delegate_to: "{{ groups['k3s_servers'][0] }}"
      run_once: true

    - name: Generate final kubeconfig locally (with LB endpoint)
      copy:
        dest: "{{ lookup('env','HOME') }}/.kube/config"
        mode: "0600"
        content: >-
          {{
            (kubeconfig_raw.content | b64decode)
            | regex_replace(
                'https://.*:6443',
                'https://' ~ k3s_lb_ip ~ ':6443'
              )
          }}
      delegate_to: localhost
      run_once: true

    - name: Confirm kubeconfig installed
      debug:
        msg: "kubeconfig installed pointing to https://{{ k3s_lb_ip }}:6443"
      run_once: true
