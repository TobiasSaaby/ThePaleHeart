- hosts: k3s_servers
  gather_facts: false

  tasks:
    - name: Bootstrap Argo CD
      include_role:
        name: gitops_bootstrap
        tasks_from: argocd

    - name: Bootstrap cert-manager
      include_role:
        name: gitops_bootstrap
        tasks_from: cert_manager

    - name: Bootstrap Longhorn
      include_role:
        name: gitops_bootstrap
        tasks_from: longhorn
