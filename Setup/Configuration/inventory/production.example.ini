[k3s_servers]
k3s-srv-1 ansible_host=<public-ip-1> local_ip=<private-ip-1>
k3s-srv-2 ansible_host=<public-ip-2> local_ip=<private-ip-2>
k3s-srv-3 ansible_host=<public-ip-3> local_ip=<private-ip-3>

[k3s_servers:vars]
ansible_user=root
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_python_interpreter=/usr/bin/python3

[k3s_lb]
api_lb ansible_host=<load-balancer-public-ip>
