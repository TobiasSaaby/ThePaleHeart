apiVersion: batch/v1
kind: CronJob
metadata:
  name: dionysus-lwin-sync
  namespace: dionysus
  labels:
    app.kubernetes.io/name: dionysus
    app.kubernetes.io/component: lwin-sync
spec:
  schedule: "17 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: dionysus
            app.kubernetes.io/component: lwin-sync
        spec:
          restartPolicy: OnFailure
          containers:
            - name: lwin-sync
              image: docker.io/tobiassaaby/dionysus-api:4d7ac22657808a79eae492833a8314b97972a260
              imagePullPolicy: Always
              command: ["python", "scripts/sync_lwin_latest.py"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: dionysus-db
                      key: DATABASE_URL
