apiVersion: apps/v1
kind: Deployment
metadata:
  name: dionysus-api
  namespace: dionysus
  labels:
    app.kubernetes.io/name: dionysus
    app.kubernetes.io/component: api
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: dionysus
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dionysus
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: docker.io/tobiassaaby/dionysus-api:76c48e28f27ab3c526009d978ae31a9b2251a47c
          imagePullPolicy: Always
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dionysus-db
                  key: DATABASE_URL
            - name: CORS_ORIGINS
              value: https://dionysus.saaby.no,http://localhost:5173,http://127.0.0.1:5173
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
