apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  project: default
  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    targetRevision: 9.1.0
    helm:
      releaseName: falco
      valuesObject:
        driver:
          kind: modern_ebpf
        collectors:
          containerd:
            enabled: true
            sockets:
              - /run/k3s/containerd/containerd.sock
        metrics:
          enabled: true
          outputRule: true
        serviceMonitor:
          create: true
        falcosidekick:
          enabled: true
          webui:
            enabled: false
          config:
            loki:
              hostport: http://loki-gateway.monitoring.svc.cluster.local:80
  destination:
    server: https://kubernetes.default.svc
    namespace: falco
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
