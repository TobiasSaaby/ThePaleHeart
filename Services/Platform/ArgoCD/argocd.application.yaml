apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 9.5.17
    helm:
      releaseName: argocd
      valuesObject:
        global:
          domain: argocd.saaby.no
          networkPolicy:
            create: true
            defaultDenyIngress: true
        configs:
          params:
            server.insecure: true
        server:
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
            hosts:
              - argocd.saaby.no
            tls:
              - secretName: argocd-server-tls
                hosts:
                  - argocd.saaby.no
        controller:
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
        repoServer:
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
        applicationSet:
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
        notifications:
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
        dex:
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
