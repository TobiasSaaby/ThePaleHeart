apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-homelab-security-platform-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Homelab
data:
  homelab-security-platform.json: |-
    {
      "uid": "homelab-security-platform",
      "title": "Homelab Security Overview",
      "tags": [
        "homelab",
        "security"
      ],
      "timezone": "browser",
      "schemaVersion": 41,
      "version": 2,
      "refresh": "1m",
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Security detections now",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "targets": [
            {
              "expr": "sum(increase(falco_events{priority=~\"Warning|Error|Critical|Alert|Emergency\"}[1h]))",
              "legendFormat": "Falco last hour"
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "description": "Runtime detections from Falco in the last hour. Non-zero means investigate the Falco panel below."
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Wazuh high-severity alerts",
          "gridPos": {
            "x": 6,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "targets": [
            {
              "expr": "count_over_time({namespace=\"wazuh\", container=\"wazuh-alerts-to-stdout\"} |~ \"level[^0-9]*(9|10|11|12|13|14|15)|critical_file_change|auth_bruteforce|host_compromise|rootkit\" [1h])",
              "legendFormat": "Wazuh last hour"
            }
          ],
          "datasource": {
            "type": "loki",
            "uid": "P8E80F9AEF21F6940"
          },
          "description": "Wazuh manager alerts forwarded to Loki. High-severity or custom groups only."
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Critical image vulnerabilities",
          "gridPos": {
            "x": 12,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "targets": [
            {
              "expr": "sum(trivy_image_vulnerabilities{severity=\"Critical\"})",
              "legendFormat": "Critical"
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "description": "Count of Trivy Operator critical image vulnerabilities across workloads."
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Wazuh agents connected",
          "gridPos": {
            "x": 18,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "targets": [
            {
              "expr": "count(count_over_time({namespace=\"wazuh\", pod=~\"wazuh-agent-.*\"} |= \"Agent is now online\" [24h]))",
              "legendFormat": "agent pods seen"
            }
          ],
          "datasource": {
            "type": "loki",
            "uid": "P8E80F9AEF21F6940"
          },
          "description": "Agent pods that emitted online logs in the last 24h. Use Wazuh UI for authoritative enrollment status."
        },
        {
          "id": 5,
          "type": "table",
          "title": "Trivy: vulnerable workloads to fix first",
          "gridPos": {
            "x": 0,
            "y": 4,
            "w": 24,
            "h": 8
          },
          "targets": [
            {
              "expr": "topk(20, sum by (namespace, resource_kind, resource_name, image_repository, image_tag, severity) (trivy_image_vulnerabilities{severity=~\"Critical|High\"}))",
              "format": "table",
              "instant": true
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "description": "Trivy Operator has no separate web UI here. These rows come from VulnerabilityReport CRDs via Prometheus metrics. For CVE detail use: kubectl -n <namespace> get vulnerabilityreport <name> -o yaml/json."
        },
        {
          "id": 6,
          "type": "logs",
          "title": "Falco detections \u2014 possible runtime compromise signals",
          "gridPos": {
            "x": 0,
            "y": 12,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "expr": "{namespace=\"falco\"} |~ \"Homelab|CRITICAL|WARNING|miner|Sensitive host path|Interactive shell|Package/download\""
            }
          ],
          "datasource": {
            "type": "loki",
            "uid": "P8E80F9AEF21F6940"
          },
          "description": "These are actual runtime detection events. Interactive shells/package managers may be admin activity or compromise; miner/sensitive host path writes are high concern."
        },
        {
          "id": 7,
          "type": "logs",
          "title": "Wazuh alerts \u2014 host integrity/auth/rootcheck",
          "gridPos": {
            "x": 12,
            "y": 12,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "expr": "{namespace=\"wazuh\", container=\"wazuh-alerts-to-stdout\"} |~ \"critical_file_change|auth_bruteforce|host_compromise|vulnerability|rootkit|level[^0-9]*(9|10|11|12|13|14|15)\""
            }
          ],
          "datasource": {
            "type": "loki",
            "uid": "P8E80F9AEF21F6940"
          },
          "description": "These are Wazuh alerts, not generic logs. Some rootcheck entries can be false positives in containers; validate before treating as compromise."
        },
        {
          "id": 8,
          "type": "table",
          "title": "Platform health \u2014 only unhealthy/noisy items",
          "gridPos": {
            "x": 0,
            "y": 20,
            "w": 24,
            "h": 7
          },
          "targets": [
            {
              "expr": "sum by (namespace, pod, phase) (kube_pod_status_phase{phase=~\"Pending|Failed|Unknown\"} == 1) or sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total{namespace=~\"argocd|dionysus|falco|monitoring|trivy-system|wazuh|woodpecker\"}[1h]))",
              "format": "table",
              "instant": true
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "description": "Operational health, separated from security detections. Ideally empty or zero."
        }
      ],
      "links": [
        {
          "title": "Wazuh UI",
          "url": "https://wazuh.saaby.no",
          "targetBlank": true
        },
        {
          "title": "Grafana",
          "url": "https://grafana.saaby.no",
          "targetBlank": true
        }
      ],
      "annotations": {
        "list": []
      }
    }
