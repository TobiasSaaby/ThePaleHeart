apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-homelab-security-platform-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Homelab
data:
  homelab-security-platform.json: |-
    {
      "uid": "homelab-security-platform",
      "title": "Homelab Security & Platform",
      "tags": [
        "homelab",
        "security",
        "platform",
        "gitops"
      ],
      "timezone": "browser",
      "schemaVersion": 41,
      "version": 1,
      "refresh": "30s",
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "query": "label_values(kube_pod_info, namespace)",
            "refresh": 1,
            "includeAll": true,
            "multi": true
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Argo CD apps by health",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum by (health_status) (argocd_app_info)",
              "legendFormat": "{{health_status}}"
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Argo CD apps by sync",
          "gridPos": {
            "x": 6,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum by (sync_status) (argocd_app_info)",
              "legendFormat": "{{sync_status}}"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Trivy vulnerabilities by severity",
          "gridPos": {
            "x": 12,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum by (severity) (trivy_image_vulnerabilities)",
              "legendFormat": "{{severity}}"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Longhorn volume actual size",
          "gridPos": {
            "x": 18,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            }
          },
          "targets": [
            {
              "expr": "sum(longhorn_volume_actual_size_bytes)",
              "legendFormat": "actual"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Pods not running/succeeded",
          "gridPos": {
            "x": 0,
            "y": 4,
            "w": 12,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum by (namespace, phase) (kube_pod_status_phase{phase=~\"Pending|Failed|Unknown\"} == 1)",
              "legendFormat": "{{namespace}} {{phase}}"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Woodpecker pod restarts",
          "gridPos": {
            "x": 12,
            "y": 4,
            "w": 12,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum by (pod) (increase(kube_pod_container_status_restarts_total{namespace=\"woodpecker\"}[1h]))",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Longhorn volume state",
          "gridPos": {
            "x": 0,
            "y": 12,
            "w": 12,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum by (state) (longhorn_volume_state)",
              "legendFormat": "{{state}}"
            }
          ]
        },
        {
          "id": 8,
          "type": "logs",
          "title": "Falco logs",
          "gridPos": {
            "x": 12,
            "y": 12,
            "w": 12,
            "h": 8
          },
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "targets": [
            {
              "expr": "{namespace=\"falco\"}"
            }
          ]
        },
        {
          "id": 9,
          "type": "logs",
          "title": "Wazuh logs",
          "gridPos": {
            "x": 0,
            "y": 20,
            "w": 12,
            "h": 8
          },
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "targets": [
            {
              "expr": "{namespace=\"wazuh\"}"
            }
          ]
        },
        {
          "id": 10,
          "type": "logs",
          "title": "Woodpecker logs",
          "gridPos": {
            "x": 12,
            "y": 20,
            "w": 12,
            "h": 8
          },
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "targets": [
            {
              "expr": "{namespace=\"woodpecker\"}"
            }
          ]
        }
      ]
    }
