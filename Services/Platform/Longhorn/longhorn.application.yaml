apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://charts.longhorn.io
    chart: longhorn
    targetRevision: 1.12.0
    helm:
      releaseName: longhorn
      valuesObject:
        persistence:
          # Keep local-path as the cluster default and require workloads to opt in
          # to replicated Longhorn storage explicitly.
          defaultClass: false
          # Current nodes do not have enough reserved Longhorn capacity for all
          # workloads at 3 replicas. Use 2 replicas now; move critical PVCs to
          # 3 replicas after adding storage capacity or externalizing telemetry.
          defaultClassReplicaCount: 2
          defaultDataLocality: disabled
        preUpgradeChecker:
          # Longhorn recommends disabling the pre-upgrade Job for GitOps tools.
          jobEnabled: false
        csi:
          podAntiAffinityPreset: hard
          attacherReplicaCount: 3
          provisionerReplicaCount: 3
          resizerReplicaCount: 3
          snapshotterReplicaCount: 3
        defaultSettings:
          defaultDataPath: /var/lib/longhorn
          defaultReplicaCount: '{"v1":"2","v2":"2"}'
          defaultDataLocality: disabled
          replicaAutoBalance: best-effort
          replicaSoftAntiAffinity: false
          replicaDiskSoftAntiAffinity: false
          storageOverProvisioningPercentage: 100
          storageMinimalAvailablePercentage: 25
          storageReservedPercentageForDefaultDisk: 20
          allowVolumeCreationWithDegradedAvailability: false
          disableSchedulingOnCordonedNode: true
          nodeDrainPolicy: block-if-contains-last-replica
          concurrentReplicaRebuildPerNodeLimit: 2
          rebuildConcurrentSyncLimit: 1
          autoCleanupSystemGeneratedSnapshot: true
        ingress:
          enabled: true
          ingressClassName: traefik
          host: longhorn.saaby.no
          tls: true
          tlsSecret: longhorn-ui-tls
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-prod
            traefik.ingress.kubernetes.io/router.entrypoints: websecure
            traefik.ingress.kubernetes.io/router.tls: "true"
        metrics:
          serviceMonitor:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
